<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Bilby Detector Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; }
    #sidebar {
      width: 280px; min-width: 200px; background: #1a1a2e; color: #eee;
      overflow-y: auto; padding: 16px; flex-shrink: 0;
    }
    #sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
                   color: #888; margin-bottom: 12px; }
    .det-card {
      background: #16213e; border-radius: 6px; padding: 10px 12px;
      margin-bottom: 8px; border-left: 4px solid var(--c);
    }
    .det-card .pfx   { font-size: 15px; font-weight: 700; color: var(--c); }
    .det-card .dname { font-size: 11px; color: #888; margin-top: 2px;
                        word-break: break-all; }
    .det-card .info  { font-size: 11px; color: #ccc; margin-top: 5px;
                        line-height: 1.6; }
    #map { flex: 1; }
    .ifo-label {
      background: transparent; border: none; box-shadow: none;
      font-weight: 700; font-size: 13px; color: #fff;
      text-shadow: 0 0 4px #000, 0 0 4px #000;
    }
    .legend {
      background: rgba(20,20,40,0.88); color: #ddd;
      padding: 8px 12px; border-radius: 6px;
      font-size: 12px; line-height: 2;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Detectors</h2>
    <div class="det-card" style="--c:#e6194b"><div class="pfx">ET1</div><div class="dname">ET_D_EMR_1_T1400308</div><div class="info">lat +50.73064°  lon +5.90069°<br>arm ½-len 5.0 km</div></div>
    <div class="det-card" style="--c:#e6194b"><div class="pfx">ET2</div><div class="dname">ET_D_EMR_2_T1400308</div><div class="info">lat +50.81534°  lon +5.85339°<br>arm ½-len 5.0 km</div></div>
    <div class="det-card" style="--c:#e6194b"><div class="pfx">ET3</div><div class="dname">ET_D_EMR_3_T1400308</div><div class="info">lat +50.79879°  lon +5.99311°<br>arm ½-len 5.0 km</div></div>
    <div class="det-card" style="--c:#e6194b"><div class="pfx">ET0</div><div class="dname">ET_D_EMR_0_T1400308</div><div class="info">lat +50.73064°  lon +5.90069°</div></div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  var map = L.map('map').setView([50.76885172494434, 5.911972647277525], 6);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO', maxZoom: 19
  }).addTo(map);

  var _d=[{"prefix": "ET1", "name": "ET_D_EMR_1_T1400308", "lat": 50.7306388888889, "lon": 5.9006944444444445, "elev": 0.0, "midpt": 5000.0, "color": "#e6194b", "arms": [{"dlat": 0.08470459223769211, "dlon": -0.04730248719486774, "label": "x", "weight": 2.5, "dash": null}, {"dlat": 0.06814675198408082, "dlon": 0.09241529852719133, "label": "y", "weight": 1.5, "dash": "5 4"}]}, {"prefix": "ET2", "name": "ET_D_EMR_2_T1400308", "lat": 50.81534348112659, "lon": 5.853391957249577, "elev": 0.0, "midpt": 5000.0, "color": "#e6194b", "arms": [{"dlat": -0.01655784025361129, "dlon": 0.13971778572205906, "label": "x", "weight": 2.5, "dash": null}, {"dlat": -0.08470459223769211, "dlon": 0.04730248719486774, "label": "y", "weight": 1.5, "dash": "5 4"}]}, {"prefix": "ET3", "name": "ET_D_EMR_3_T1400308", "lat": 50.79878564087298, "lon": 5.993109742971636, "elev": 0.0, "midpt": 5000.0, "color": "#e6194b", "arms": [{"dlat": -0.06814675198408082, "dlon": -0.09241529852719133, "label": "x", "weight": 2.5, "dash": null}, {"dlat": 0.01655784025361129, "dlon": -0.13971778572205906, "label": "y", "weight": 1.5, "dash": "5 4"}]}, {"prefix": "ET0", "name": "ET_D_EMR_0_T1400308", "lat": 50.7306388888889, "lon": 5.9006944444444445, "elev": 0.0, "midpt": 0.0, "color": "#e6194b", "arms": [null, null]}]; _d.forEach(function(d) {
    L.circleMarker([d.lat, d.lon], {
      radius: 7, color: d.color, fillColor: d.color, fillOpacity: 0.9, weight: 2
    }).addTo(map).bindPopup(
      '<b>' + d.prefix + '</b><br>'
      + '<span style="color:#aaa;font-size:11px">' + d.name + '</span><br>'
      + 'lat ' + d.lat.toFixed(5) + '°,  lon ' + d.lon.toFixed(5) + '°'
      + (d.elev  ? '<br>elev ' + d.elev.toFixed(1) + ' m' : '')
      + (d.midpt ? '<br>arm ½-len ' + (d.midpt/1000).toFixed(2) + ' km' : '')
    );

    L.marker([d.lat, d.lon], {
      icon: L.divIcon({ className:'ifo-label', html: d.prefix, iconAnchor:[-10,6] }),
      interactive: false
    }).addTo(map);

    d.arms.forEach(function(arm) {
      if (!arm) return;
      L.polyline([[d.lat, d.lon], [d.lat+arm.dlat, d.lon+arm.dlon]], {
        color: d.color, weight: arm.weight, opacity: 0.9,
        dashArray: arm.dash || null
      }).addTo(map).bindTooltip(d.prefix + ' ' + arm.label + '-arm');
    });
  });

  var _l=[{"coords": [[50.7306388888889, 5.9006944444444445], [50.81534348112659, 5.853391957249577], [50.79878564087298, 5.993109742971636], [50.7306388888889, 5.9006944444444445]], "color": "#e6194b"}]; _l.forEach(function(lk) {
    L.polyline(lk.coords, {
      color: lk.color, weight: 1.2, opacity: 0.4, dashArray: '6 4'
    }).addTo(map);
  });

  var leg = L.control({position:'bottomright'});
  leg.onAdd = function() {
    var d = L.DomUtil.create('div','legend');
    d.innerHTML = [
      '<span style="display:inline-block;width:24px;height:3px;background:#fff;vertical-align:middle;margin-right:6px"></span>x-arm',
      '<span style="display:inline-block;width:24px;border-top:2px dashed #fff;vertical-align:middle;margin-right:6px;opacity:.5"></span>y-arm',
      '<span style="display:inline-block;width:24px;border-top:2px dashed #aaa;vertical-align:middle;margin-right:6px;opacity:.5"></span>triangle link'
    ].join('<br>');
    return d;
  };
  leg.addTo(map);
  </script>
</body>
</html>
